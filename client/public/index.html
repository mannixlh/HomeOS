<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HouseOS Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [rooms, setRooms] = useState([]);
            const [showModal, setShowModal] = useState(false);
            const [newRoomName, setNewRoomName] = useState("");
            const [paintBrand, setPaintBrand] = useState("");
            const [paintColor, setPaintColor] = useState("");

            useEffect(() => {
                fetchRooms();
            }, []);

            const fetchRooms = async () => {
                try {
                    const res = await axios.get('http://localhost:3000/api/rooms');
                    setRooms(res.data);
                } catch (err) { console.error(err); }
            };

            const handleSaveRoom = async () => {
                if (!newRoomName) return;
                try {
                    const res = await axios.post('http://localhost:3000/api/rooms', {
                        name: newRoomName,
                        paintBrand: paintBrand,
                        paintColor: paintColor,
                        devices: []
                    });
                    setRooms([...rooms, res.data]);
                    setNewRoomName(""); setPaintBrand(""); setPaintColor("");
                    setShowModal(false);
                } catch (err) { console.error(err); }
            };

            return (
                <div className="p-8 max-w-6xl mx-auto">
                    <header className="flex justify-between items-center mb-8">
                        <h1 className="text-3xl font-bold text-gray-800">HouseOS Dashboard</h1>
                        <button onClick={() => setShowModal(true)} className="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                            + Add Room
                        </button>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {rooms.map((room) => (
                            <div key={room._id} className="bg-white p-6 rounded-xl shadow-md border border-gray-200">
                                <h2 className="text-xl font-semibold mb-2">{room.name}</h2>
                                <p className="text-sm text-gray-500 mb-4">Paint: {room.paintBrand || 'N/A'} ({room.paintColor || 'N/A'})</p>
                                <ul className="list-disc pl-5 text-gray-600">
                                    {room.devices?.map((d, i) => <li key={i}>{d}</li>)}
                                </ul>
                            </div>
                        ))}
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
                            <div className="bg-white p-8 rounded-2xl w-full max-w-md shadow-2xl">
                                <h2 className="text-2xl font-bold mb-4">Add New Room</h2>
                                <label className="block mb-2 text-sm font-medium">Room Name</label>
                                <input value={newRoomName} onChange={(e) => setNewRoomName(e.target.value)} className="w-full border p-2 rounded mb-4" />
                                
                                <label className="block mb-2 text-sm font-medium">Paint Brand</label>
                                <input value={paintBrand} onChange={(e) => setPaintBrand(e.target.value)} className="w-full border p-2 rounded mb-4" />
                                
                                <label className="block mb-2 text-sm font-medium">Paint Color</label>
                                <input value={paintColor} onChange={(e) => setPaintColor(e.target.value)} className="w-full border p-2 rounded mb-6" />

                                <div className="flex justify-end gap-3">
                                    <button onClick={() => setShowModal(false)} className="text-gray-500">Cancel</button>
                                    <button onClick={handleSaveRoom} className="bg-blue-600 text-white px-6 py-2 rounded-lg">Save Room</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
