<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./Styles/main.css">
  <title>HomeOS</title>
  <style>
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
  </style>
</head>

<body>
  <header>
    <h1>HomeOS</h1>
    <ul>
      <li><a href="">About</a></li>
      <li><a href="">Contact</a></li>
    </ul>
  </header>
  <div id="homeos-dashboard" class="room-grid">

  </div>
  <button class="floating-add-btn" id="open-popup-btn" title="Add Room">+</button>
  <div id="add-modal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-header">
        <h3 style="margin: 0;">Initialize Sector</h3>
        <button class="close-btn" id="close-popup-btn">×</button>
      </div>
    </div>
    <div id="room-form">
      <input type="text" id="roomName" placeholder="Room Name">
      <input type="text" id="paintBrand" placeholder="Paint Brand">
      <input type="text" id="paintColor" placeholder="Paint Color">
      <button type="button" id="saveBtn">Save Room</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>

</html>
