<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./Styles/main.css">
    <title>HomeOS</title>
    <style>
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

       
    </style>
</head>
<body>
    <header>
        <h1>HomeOS</h1>
        <ul>
            <li><a href="">About</a></li>
            <li><a href="">Contact</a></li>
        </ul>
    </header>
    <div id="homeos-dashboard" class="room-grid">

    </div>
    <button class="floating-add-btn" id="open-popup-btn" title="Add Room">+</button>
    <div id="add-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3 style="margin: 0;">Initialize Sector</h3>
                <button class="close-btn" id="close-popup-btn">×</button>
            </div>

            <div class="form-group">
                <label>Sector Name</label>
                <input type="text" id="popup-room-name" class="form-control" placeholder="Enter room name...">
            </div>
            <div class="form-group">
                <label>Elevation Level</label>
                <select id="popup-room-level" class="form-control">
                    <option value="Main Level">Main Level</option>
                    <option value="Lower Level">Lower Level</option>
                    <option value="Upper Level">Upper Level</option>
                    <option value="Exterior">Exterior</option>
                </select>
            </div>
            <button class="submit-btn" onclick="buildPopupRoom()">Add Sector</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
