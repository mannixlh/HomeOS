<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeOS Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body class="bg-gray-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [rooms, setRooms] = useState([]);
            const [showModal, setShowModal] = useState(false);
            const [showServiceModal, setShowServiceModal] = useState(false);
            const [serviceDate, setServiceDate] = useState("");
            const [selectedService, setSelectedService] = useState(null);
            const [newRoomName, setNewRoomName] = useState("");
            const [paintBrand, setPaintBrand] = useState("");
            const [paintColor, setPaintColor] = useState("");

            useEffect(() => {
                fetchRooms();
            }, []);

            const fetchRooms = async () => {
                try {
                    const res = await axios.get('https://homeos-s4zu.onrender.com/api/rooms');
                    setRooms(res.data);
                } catch (err) { console.error(err); }
            };


            const handleSaveRoom = async () => {
                if (!newRoomName) return;
                try {
                    const res = await axios.post('https://homeos-s4zu.onrender.com/api/rooms', {
                        name: newRoomName,
                        paintBrand: paintBrand,
                        paintColor: paintColor,
                        devices: []
                    });
                    setRooms([...rooms, res.data]);
                    setNewRoomName(""); setPaintBrand(""); setPaintColor("");
                    setShowModal(false);
                } catch (err) { console.error(err); }
            };

            const handleAddDevice = async (roomId, deviceName) => {
                if (!deviceName) return;

                try {
                    const response = await axios.put(`https://homeos-s4zu.onrender.com/api/rooms/${roomId}/add-device`, {
                        device: deviceName
                    });

                    setRooms(rooms.map(room => room._id === roomId ? response.data : room));
                } catch (err) {
                    console.error("Error adding device:", err);

                }
            };

            const handleUpdateDeviceService = async (roomId, deviceIndex) => {
                setSelectedService({ roomId, deviceIndex });
                setServiceDate(new Date().toISOString().split('T')[0]);
                setShowServiceModal(true);
            };

            const handleSaveServiceDate = async () => {
                if (!selectedService) return;
                try {
                    const lastServiced = serviceDate ? new Date(serviceDate) : Date.now();
                    const res = await axios.put(`https://homeos-s4zu.onrender.com/api/rooms/${selectedService.roomId}/devices/${selectedService.deviceIndex}/service`, { lastServiced });
                    setRooms(rooms.map(room => room._id === selectedService.roomId ? res.data : room));
                    setShowServiceModal(false);
                    setSelectedService(null);
                    setServiceDate("");
                } catch (err) {
                    console.error("Error updating device service:", err);
                }
            };

            const handleDeleteRoom = async (roomId) => {
                if (!window.confirm("Are you sure you want to delete this room?")) return;

                try {
                    await axios.delete(`https://homeos-s4zu.onrender.com/api/rooms/${roomId}`);
                    setRooms(rooms.filter(room => room._id !== roomId));
                } catch (err) {
                    console.error("Error deleting room:", err);
                }
            };

            return (
                <div className="p-8 max-w-6xl mx-auto">
                    <header className="flex justify-between items-center mb-8">
                        <h1 className="text-3xl font-bold text-gray-800">HomeOS Dashboard</h1>
                        <button onClick={() => setShowModal(true)} className="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                            + Add Room
                        </button>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        {rooms.map((room) => (
                            <div key={room._id} style={{ background: 'white', padding: '20px', borderRadius: '10px', width: '100%', boxShadow: '0 2px 5px rgba(0,0,0,0.1)', position: 'relative' }}>
                                <h2 style={{ margin: '0 0 5px 0', fontWeight: 'bold' }}>{room.name}</h2>
                                <p style={{ fontSize: '14px', color: '#666', margin: '0 0 10px 0' }}>
                                    {room.paintBrand} - {room.paintColor}
                                </p>
                                {/*delete room button*/}
                                <button
                                    onClick={() => handleDeleteRoom(room._id)}
                                    style={{
                                        position: 'absolute',
                                        top: '10px',
                                        right: '10px',
                                        backgroundColor: 'transparent',
                                        border: 'none',
                                        color: '#888',
                                        cursor: 'pointer',
                                        fontSize: '18px'
                                    }}
                                    title="Delete"
                                >
                                    &times;
                                </button>

                                <div style={{ margin: '10px 0' }}>
                                    <ul className="mt-2 space-y-3">
                                    {room.devices && room.devices.map((device, index) => (
                                        <li key={index} className="text-sm bg-gray-50 p-2 rounded border border-gray-100">
                                            <div className="flex justify-between items-center">
                                                <span className="font-medium text-gray-800">{device.name || device}</span>
                                                <button 
                                                    onClick={() => handleUpdateDeviceService(room._id, index)}
                                                    className="text-[10px] bg-gray-200 hover:bg-green-500 hover:text-white px-2 py-1 rounded transition"
                                                >
                                                    Set Date
                                                </button>
                                            </div>
                                            <div className="text-[11px] text-gray-500 mt-1">
                                                Last Serviced: {device.lastServiced ? new Date(device.lastServiced).toLocaleDateString() : 'Never'}
                                            </div>
                                        </li>
                                        ))}
                                    </ul>

                                    {/* Add Device Input */}
                                    <div className="device-input-container" style={{ marginTop: '15px', display: 'flex', gap: '5px' }}>
                                        <input
                                            type="text"
                                            placeholder="Add device (e.g. Lamp)"
                                            id={`input-${room._id}`} // Unique ID so we know which room we are typing in
                                            style={{
                                                flex: 1,
                                                padding: '3px',
                                                fontSize: '12px',
                                                borderRadius: '4px',
                                                border: '1px solid #ccc'
                                            }}
                                        />
                                        <button
                                            onClick={() => {
                                                const input = document.getElementById(`input-${room._id}`);
                                                if (input.value) {
                                                    handleAddDevice(room._id, input.value);
                                                    input.value = ''; // Clear the box after adding
                                                }
                                            }}
                                            style={{
                                                padding: '3px 8px',
                                                fontSize: '12px',
                                                backgroundColor: '#007bff',
                                                color: 'white',
                                                border: 'none',
                                                borderRadius: '4px',
                                                cursor: 'pointer'
                                            }}
                                        >
                                            +
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
                            <div className="bg-white p-8 rounded-2xl w-full max-w-md shadow-2xl">
                                <h2 className="text-2xl font-bold mb-4">Add New Room</h2>
                                <label className="block mb-2 text-sm font-medium">Room Name</label>
                                <input value={newRoomName} onChange={(e) => setNewRoomName(e.target.value)} className="w-full border p-2 rounded mb-4" />

                                <label className="block mb-2 text-sm font-medium">Paint Brand</label>
                                <input value={paintBrand} onChange={(e) => setPaintBrand(e.target.value)} className="w-full border p-2 rounded mb-4" />

                                <label className="block mb-2 text-sm font-medium">Paint Color</label>
                                <input value={paintColor} onChange={(e) => setPaintColor(e.target.value)} className="w-full border p-2 rounded mb-6" />

                                <div className="flex justify-end gap-3">
                                    <button onClick={() => setShowModal(false)} className="text-gray-500">Cancel</button>
                                    <button onClick={handleSaveRoom} className="bg-blue-600 text-white px-6 py-2 rounded-lg">Save Room</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showServiceModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
                            <div className="bg-white p-8 rounded-2xl w-full max-w-md shadow-2xl">
                                <h2 className="text-2xl font-bold mb-4">Set Last Serviced Date</h2>
                                <label className="block mb-2 text-sm font-medium">Service Date</label>
                                <input type="date" value={serviceDate} onChange={(e) => setServiceDate(e.target.value)} className="w-full border p-2 rounded mb-6" />

                                <div className="flex justify-end gap-3">
                                    <button onClick={() => { setShowServiceModal(false); setSelectedService(null); }} className="text-gray-500">Cancel</button>
                                    <button onClick={async () => {
                                        if (selectedService) {
                                            try {
                                                const res = await axios.put(`https://homeos-s4zu.onrender.com/api/rooms/${selectedService.roomId}/devices/${selectedService.deviceIndex}/service`, { lastServiced: null });
                                                setRooms(rooms.map(room => room._id === selectedService.roomId ? res.data : room));
                                                setShowServiceModal(false);
                                                setSelectedService(null);
                                                setServiceDate("");
                                            } catch (err) {
                                                console.error("Error clearing service date:", err);
                                            }
                                        }
                                    }} className="bg-gray-400 text-white px-6 py-2 rounded-lg">Clear Date</button>
                                    <button onClick={handleSaveServiceDate} className="bg-green-600 text-white px-6 py-2 rounded-lg">Save Date</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
